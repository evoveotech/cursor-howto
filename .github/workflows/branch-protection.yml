name: Block Direct Push to Main

# CI-level backup to GitHub branch protection settings.
# Uses the GitHub API to reliably detect whether a commit SHA came from a PR.
# Works for all merge strategies: merge commit, squash, and rebase.

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  verify-pr-merge:
    name: Verify PR Merge
    runs-on: ubuntu-latest
    steps:
      - name: Check if commit came from a pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });

            if (pulls.length === 0) {
              core.setFailed(
                'Direct push to main detected. All changes must go through a pull request.'
              );
            } else {
              const prNumbers = pulls.map(p => `#${p.number}`).join(', ');
              core.info(`✅ Verified: Commit is from PR ${prNumbers}`);
            }
