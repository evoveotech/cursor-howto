name: Branch Protection Check

# This workflow acts as a CI-level backup to GitHub's branch protection settings.
# It fails on any direct push to main that doesn't come from a PR,
# providing an audit trail even if settings are accidentally changed.

on:
  push:
    branches: [main]

jobs:
  verify-pr-merge:
    name: Verify PR Merge
    runs-on: ubuntu-latest
    # Only run if this push came from a merge commit in a PR
    if: github.event_name == 'push' && contains(github.event.head_commit.message, 'Merge pull request')

    steps:
      - name: Confirm PR merge
        run: |
          echo "✅ Confirmed: This push is from a merged pull request"
          echo "Commit: ${{ github.event.head_commit.message }}"
          echo "Author: ${{ github.event.head_commit.author.name }}"

  block-direct-push:
    name: Block Direct Push
    runs-on: ubuntu-latest
    # Run if this is a direct push (not a PR merge)
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, 'Merge pull request')

    steps:
      - name: Fail on direct push to main
        run: |
          echo "❌ Direct pushes to main are not allowed."
          echo ""
          echo "To contribute:"
          echo "  1. git checkout -b feature/your-change"
          echo "  2. Make your changes and commit"
          echo "  3. git push origin feature/your-change"
          echo "  4. Open a pull request to main"
          echo ""
          echo "Commit that was rejected:"
          echo "  ${{ github.event.head_commit.message }}"
          exit 1
